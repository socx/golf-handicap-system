server:
  http_listen_address: 127.0.0.1
  http_listen_port: 9080

enabled: true

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push

scrape_configs:
  - job_name: systemd
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: systemd
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
    pipeline_stages:
      - json:
          expressions:
            level: level
            requestId: requestId
            userId: userId
            method: method
            path: path
            statusCode: statusCode
            timestamp: timestamp
      - labels:
          level:
          requestId:
          userId:
          method:
          statusCode:

  - job_name: nginx-access
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          service: edge
          __path__: /var/log/nginx/access.log

  - job_name: postgres
    static_configs:
      - targets: [localhost]
        labels:
          job: postgresql
          service: database
          __path__: /var/log/postgresql/*.log
