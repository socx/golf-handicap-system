# --- RECOMMENDED FOR GHS: Symlink Approach ---
# 
# 1. On droplet, create symlink:
#    ln -sf /opt/apps/ghs-blue /opt/apps/ghs
# 
# 2. Keep single upstream definition pointing to 127.0.0.1:3005 and :5175
# 
# 3. Services in blue-green-deploy.sh will:
#    - Start ghs-api-blue on :3005 and ghs-api-green on :3006
#    - Update symlink: ln -sfn /opt/apps/ghs-blue /opt/apps/ghs
#    - OR use PORT env var to make services bind to different ports
# 
# 4. Nginx upstream always points to the active symlink ports
# 
# 5. To switch: just restart services or use port-switching mechanism
#
# This approach requires minimal nginx changes and is very fast (<1s switch time)

# Example server block:

server {
    listen 80;
    listen 443 ssl http2;
    server_name ghs.socx.org.uk;

    # SSL config...

    # API routing
    location /api/ {
        proxy_pass http://ghs_api;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Web routing
    location / {
        proxy_pass http://ghs_web;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}

# --- SWITCHING MECHANISM ---
# 
# Before deployment:
#   ACTIVE: ghs-api on :3005, ghs-web on :5175 (blue)
#   STAGING: ghs-api on :3006, ghs-web on :5176 (green)
# 
# After deploying to green and passing health checks:
#   echo "green" > /var/run/ghs-active-slot
#   nginx -s reload  # or systemctl reload nginx
# 
# Nginx will then route to green (:3006, :5176)
# 
# To rollback:
#   echo "blue" > /var/run/ghs-active-slot
#   nginx -s reload
# 
# Services stay running on both ports for instant switching

