# Nginx upstream configuration for blue-green deployment
# 
# This file shows how nginx should be configured to support blue-green deployment
# It's normally in the do-nginx-infra repository, but documented here for reference
# 
# The key mechanism is to have two upstream blocks and switch between them
# based on the active slot file (/var/run/ghs-active-slot)
# 
# You can use:
# 1. Dynamic upstream switching with nginx modules
# 2. Symlink-based approach where /opt/apps/ghs points to active slot
# 3. Environment variable interpolation via systemd
# 4. Custom lua script in nginx to read slot file

# --- APPROACH 1: Symlink-based (simplest) ---
# Instead of two upstream definitions, keep:
# /opt/apps/ghs -> symlink to either /opt/apps/ghs-blue or /opt/apps/ghs-green
# This way, services always use /opt/apps/ghs and don't need reconfiguration

upstream ghs_api {
    server 127.0.0.1:3005;  # Routes to /opt/apps/ghs/apps/api
}

upstream ghs_web {
    server 127.0.0.1:5175;  # Routes to /opt/apps/ghs/apps/web
}

# --- APPROACH 2: Explicit dual upstream (requires reload) ---
# Define two explicit upstreams and rotate between them
# This requires nginx config reload to switch

upstream ghs_api_blue {
    server 127.0.0.1:3005;
}

upstream ghs_api_green {
    server 127.0.0.1:3006;
}

upstream ghs_web_blue {
    server 127.0.0.1:5175;
}

upstream ghs_web_green {
    server 127.0.0.1:5176;
}

