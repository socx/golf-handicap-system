name: Sync Issues Back Into Story Files

on:
  issues:
    types: [edited, labeled, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync-issues:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync issue updates into story file
        id: sync
        run: python3 .github/scripts/sync_issue_to_story.py

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.sync.outputs.story_file }}"
          git commit -m "Sync issue #${{ github.event.issue.number }} back into story file"
          git push
