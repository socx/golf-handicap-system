name: CI/CD

on:
  # Run quality checks for PRs targeting main.
  pull_request:
    branches: [main]

  # Run quality checks + deploy for main branch updates.
  push:
    branches: [main]

  # Allow manual reruns from the Actions tab.
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks (install/lint/test/build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Install all workspace dependencies from lockfile.
      - name: Install dependencies
        run: npm ci

      # Lint all workspaces (if scripts exist).
      - name: Lint
        run: npm run lint

      # Run tests across workspaces.
      - name: Test
        run: npm run test

      # Build artifacts across workspaces.
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to production droplet
    needs: quality
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Package current repo snapshot for remote deployment.
      - name: Package release artifact
        run: |
          tar --exclude='.git' --exclude='**/node_modules' -czf "$RUNNER_TEMP/release.tgz" .
          cp "$RUNNER_TEMP/release.tgz" release.tgz

      # Copy artifact to droplet temporary directory.
      - name: Upload artifact to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "release.tgz"
          target: "/tmp"

      # Extract, install production deps, and restart systemd services.
      - name: Deploy and restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: APP_ENV_FILE,GITHUB_SHA
          script: |
            set -euo pipefail
            DEPLOY_USER="$(id -un)"
            APP_DIR="/opt/apps/ghs"
            TMP_DIR="/tmp/ghs-release-${GITHUB_SHA:0:7}"
            BACKUP_DIR="$APP_DIR/rollback/${GITHUB_SHA:0:7}-$(date +%Y%m%d%H%M%S)"
            BUILD_ID="${GITHUB_SHA:0:12}"

            sudo mkdir -p "$APP_DIR" "$APP_DIR/rollback"
            sudo chown -R "$DEPLOY_USER:$DEPLOY_USER" "$APP_DIR"

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use node >/dev/null 2>&1 || true
            fi
            export PATH="$HOME/.nvm/versions/node/*/bin:$HOME/node_modules/.bin:/usr/local/bin:/usr/bin:$PATH"

            NPM_BIN="$(command -v npm || true)"
            if [ -z "$NPM_BIN" ]; then
              echo "npm not found on remote host. Install Node.js for deploy user or system-wide." >&2
              exit 1
            fi

            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            tar -xzf /tmp/release.tgz -C "$TMP_DIR"
            rm -f /tmp/release.tgz

            mkdir -p "$BACKUP_DIR/apps"
            if [ -d "$APP_DIR/apps/web" ]; then cp -a "$APP_DIR/apps/web" "$BACKUP_DIR/apps/web"; fi

            # Deploy monorepo files required for workspace-aware npm ci.
            rm -rf "$APP_DIR/apps" "$APP_DIR/packages" "$APP_DIR/infra" "$APP_DIR/db" "$APP_DIR/scripts"
            cp -a "$TMP_DIR/apps" "$APP_DIR/apps"
            cp -a "$TMP_DIR/packages" "$APP_DIR/packages"
            cp -a "$TMP_DIR/infra" "$APP_DIR/infra"
            cp -a "$TMP_DIR/db" "$APP_DIR/db"
            if [ -d "$TMP_DIR/scripts" ]; then
              cp -a "$TMP_DIR/scripts" "$APP_DIR/scripts"
            fi
            cp -a "$TMP_DIR/package.json" "$APP_DIR/package.json"
            cp -a "$TMP_DIR/package-lock.json" "$APP_DIR/package-lock.json"
            cp -a "$TMP_DIR/tsconfig.base.json" "$APP_DIR/tsconfig.base.json"

            if [ -n "${APP_ENV_FILE:-}" ]; then
              umask 077
              printf '%s\n' "$APP_ENV_FILE" > "$APP_DIR/apps/web/.env.production"
              printf '%s\n' "$APP_ENV_FILE" > "$APP_DIR/apps/api/.env.production"
            fi

            cd "$APP_DIR" && "$NPM_BIN" ci --workspace packages/types --workspace apps/api --workspace apps/web --no-audit --no-fund
            cd "$APP_DIR/apps/web"
            BUILD_ID="$BUILD_ID" "$NPM_BIN" run build --if-present

            # Keep web dev dependencies installed because ghs-web runs via `npm run preview` (vite preview).
            # Only prune API workspace development dependencies after the web build completes.
            cd "$APP_DIR" && "$NPM_BIN" prune --omit=dev --workspace packages/types --workspace apps/api --no-audit --no-fund

            # Extract DATABASE_URL from the .env.production file for migrations.
            if [ -f "$APP_DIR/apps/api/.env.production" ]; then
              MIGRATION_DB_URL=$(grep '^DATABASE_URL=' "$APP_DIR/apps/api/.env.production" | cut -d'=' -f2-)
            fi

            # Run database migrations.
            if [ -d "$APP_DIR/db/migrations" ] && [ "$(find "$APP_DIR/db/migrations" -name "*.sql" 2>/dev/null | wc -l)" -gt 0 ]; then
              if [ -z "${MIGRATION_DB_URL:-}" ]; then
                echo "WARNING: DATABASE_URL not found in .env.production; skipping migrations." >&2
              else
                echo "Running database migrations (dry-run)..."
                DRY_RUN=1 DATABASE_URL="$MIGRATION_DB_URL" bash "$APP_DIR/infra/scripts/run-migrations.sh" || {
                  echo "Migration dry-run failed; aborting deploy." >&2
                  exit 1
                }
                echo "Migration dry-run succeeded. Running actual migrations..."
                DATABASE_URL="$MIGRATION_DB_URL" bash "$APP_DIR/infra/scripts/run-migrations.sh"
              fi
            fi

            sudo systemctl daemon-reload

            WEB_SERVICE="ghs-web"
            API_SERVICE=""
            if sudo systemctl cat ghs-api.service >/dev/null 2>&1; then
              API_SERVICE="ghs-api"
            elif sudo systemctl cat www-api.service >/dev/null 2>&1; then
              API_SERVICE="www-api"
            else
              echo "Missing required API unit: ghs-api.service or www-api.service" >&2
              exit 1
            fi

            # Required services.
            for svc in "$WEB_SERVICE" "$API_SERVICE"; do
              if ! sudo systemctl cat "${svc}.service" >/dev/null 2>&1; then
                echo "Missing required unit: ${svc}.service — install systemd files from do-nginx-infra on the droplet" >&2
                exit 1
              fi
              sudo systemctl enable "$svc"
              sudo systemctl restart "$svc"
              sudo systemctl status "$svc" --no-pager || true
            done

            # Optional worker service.
            if sudo systemctl cat ghs-worker.service >/dev/null 2>&1; then
              sudo systemctl enable ghs-worker
              sudo systemctl restart ghs-worker
              sudo systemctl status ghs-worker --no-pager || true
            else
              echo "Skipping optional unit: ghs-worker.service (not yet installed)"
            fi

            web_healthy=0
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://127.0.0.1:5175/ >/dev/null || curl -fsS https://ghs.socx.org.uk/ >/dev/null; then
                web_healthy=1
                break
              fi
              sleep 2
            done

            if [ "$web_healthy" -ne 1 ]; then
              echo "Web health check failed on droplet; rolling back web release." >&2
              if [ -d "$BACKUP_DIR/apps/web" ]; then
                rm -rf "$APP_DIR/apps/web"
                cp -a "$BACKUP_DIR/apps/web" "$APP_DIR/apps/web"
                sudo systemctl restart "$WEB_SERVICE" || true
              fi
              exit 1
            fi

            ls -1dt "$APP_DIR"/rollback/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
            rm -rf "$TMP_DIR"

      # Confirm public endpoints are healthy after restart.
      - name: Post-deploy smoke checks
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5; do
            if curl -fsS https://ghs.socx.org.uk/ >/dev/null; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Web smoke check failed: https://ghs.socx.org.uk/" >&2
              exit 1
            fi
            sleep 3
          done

          for i in 1 2 3 4 5; do
            if curl -fsS https://ghs.socx.org.uk/api/health >/dev/null; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "API smoke check failed: https://ghs.socx.org.uk/api/health" >&2
              exit 1
            fi
            sleep 3
          done
